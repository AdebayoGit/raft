language = "C"
header = """
/* Generated by cbindgen — do not edit.
 *
 * C header for raft-db FFI layer.
 * Link against libraftdb.a (static) or libraftdb.dylib/so (dynamic).
 */"""
include_guard = "RAFT_DB_H"
tab_width = 4
style = "both"
cpp_compat = true
after_includes = """
/* FFI feature is always active when this header is present. */
#define RAFT_DB_FFI
"""

[defines]
"feature = ffi" = "RAFT_DB_FFI"

[parse]
parse_deps = false

[enum]
rename_variants = "ScreamingSnakeCase"
prefix_with_name = true

[fn]
prefix = "rft_"
rename_args = "None"

[export]
exclude = ["InternalCompactionState", "WalEntry"]
