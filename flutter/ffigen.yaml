name: RaftDbBindings
description: Raw FFI bindings for raft-db C API.
output: 'lib/src/raft_db_bindings.dart'

headers:
  entry-points:
    - '../core/include/raft.h'

compiler-opts:
  - '-w'

# Only emit the raft-specific symbols; exclude all system header noise.
functions:
  include:
    - 'rft_open'
    - 'rft_close'
    - 'rft_put'
    - 'rft_get'
    - 'rft_delete'

structs:
  include:
    - 'RaftDb'

enums:
  include:
    - 'RftError'

globals:
  exclude:
    - '.*'

unnamed-enums:
  exclude:
    - '.*'

typedefs:
  exclude:
    - '.*'

silence-enum-warning: true

preamble: |
  // AUTO-GENERATED — do not edit.
  // Generated by dart run ffigen from raft.h.
  // ignore_for_file: unused_element, unused_field, camel_case_types
